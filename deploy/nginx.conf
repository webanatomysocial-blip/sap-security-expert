# /etc/nginx/sites-available/sap-security-expert
#
# USAGE:
#   1. Copy to /etc/nginx/sites-available/sap-security-expert
#   2. Replace every occurrence of DOMAIN with your real domain (e.g. sap.webanatomy.in)
#   3. sudo ln -s /etc/nginx/sites-available/sap-security-expert /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. Run Certbot to add HTTPS: sudo certbot --nginx -d DOMAIN
#
# After Certbot runs it will automatically add SSL blocks below.

server {
    listen 80;
    server_name DOMAIN;

    # Limit upload body size (blog images, profile photos)
    client_max_body_size 20M;

    # All traffic → unified Next.js + Express server on port 3000.
    # start.cjs routes /api/* and /uploads/* to Express internally.
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;

        # Required for WebSocket connections (Next.js HMR is not used in prod,
        # but the header is harmless and future-proofs the config)
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        'upgrade';

        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        # Generous timeouts for SSR pages that do DB queries
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }
}
